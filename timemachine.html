<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UC Time Machine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');

  :root {
    --bg: #000080;
    --text: #ffffff;
    --lime: #00ff00;
    --cyan: #00ffff;
    --yellow: #FFCC00;
    --grey: #c0c0c0;
    --navy: #000080;
  }

  * {margin:0; padding:0; box-sizing:border-box;}
  body {
    background: var(--bg);
    font-family:'VT323',monospace;
    color: var(--text);
    text-align:center;
  }

  .main-header {
    background:#000; 
    border-bottom:4px groove #808080;
    padding:16px;
  }

  .main-header .title {
    font-family:'Press Start 2P',monospace; 
    font-size:28px; 
    color:var(--lime);
  }

  .page-wrapper {
    padding:24px;
    max-width:960px;
    margin:0 auto;
  }

  .time-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap:12px;
    margin-top:32px;
  }

  .time-card {
    background: var(--grey);
    border:2px outset #fff;
    min-height:120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family:'Press Start 2P',monospace;
    font-size:12px;
    text-decoration: none;
    color: var(--navy);
  }

  .time-card:hover {
    background: var(--yellow);
    color: #000080;
    border:2px inset #fff;
  }

  .footer {
    margin-top:48px;
    font-size:12px;
    color: var(--cyan);
  }

</style>
</head>
<body>

<div class="main-header">
  <div class="title">UC TIME MACHINE</div>
</div>

<div class="page-wrapper">
  <h2 style="font-family:'Press Start 2P',monospace;color:var(--yellow);margin-bottom:16px;">
    Select a Version to Travel Back To
  </h2>

  <div class="time-grid">
    <!-- Just copy/paste more cards as you upload old versions -->
    <a class="time-card" href="ucHome_v0_1.html">🕹 ucHome v0.1</a>
    <a class="time-card" href="ucHome_v0_2.html">🕹 ucHome v0.2</a>
    <a class="time-card" href="ucHome_v0_3.html">🕹 ucHome v0.3</a>
    <a class="time-card" href="ucHome_v0_4.html">🕹 ucHome v0.4</a>
    <a class="time-card" href="ucHome_v0_5.html">🕹 ucHome v0.5</a>
    <!-- add more cards here for each old file -->
  </div>

  <div class="footer">
    UC Time Machine &copy; 2000s Web Vibes
  </div>
</div>

</body>
</html>
