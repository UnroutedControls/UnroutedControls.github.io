name: Publish BS Mail Post

# ─────────────────────────────────────────────────────────────
# Triggers when you push a .md file to posts/ on the live branch.
# live = your GitHub Pages branch (the one your site deploys from).
#
# WHAT IT DOES:
#   1. Reads your .md file from posts/
#   2. Injects it into brainstew.html
#   3. Commits brainstew.html back to live
#   4. GitHub Pages redeploys (~60 seconds)
#   5. Sends newsletter via Buttondown (if API key is set)
#
# SECRETS (repo Settings → Secrets and variables → Actions):
#   BUTTONDOWN_API_KEY  — from buttondown.com/settings/api (optional)
#   SITE_URL            — https://uc.unrouted.org (optional, for email footer)
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - live
    paths:
      - 'posts/**.md'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout full repo ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: live
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ─────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Find which posts changed in this push ──────────
      - name: Find changed posts
        id: find_posts
        run: |
          CHANGED=$(
            git diff --name-only --diff-filter=AM \
              ${{ github.event.before }} ${{ github.sha }} \
              -- 'posts/*.md' 2>/dev/null \
            || git show --name-only --format="" \
              ${{ github.sha }} -- 'posts/*.md'
          )
          if [ -z "$CHANGED" ]; then
            echo "No markdown files found — nothing to do"
            exit 0
          fi
          echo "Changed files:"
          echo "$CHANGED"
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED"          >> $GITHUB_OUTPUT
          echo "EOF"               >> $GITHUB_OUTPUT

      # ── 4. Patch brainstew.html ───────────────────────────
      - name: Patch brainstew.html
        run: |
          python3 .github/scripts/patch_brainstew.py \
            "${{ steps.find_posts.outputs.changed_files }}"

      # ── 5. Commit and push updated brainstew.html ─────────
      - name: Commit and push
        run: |
          git config user.name  "BS Mail Bot"
          git config user.email "bsmail@unroutedcontrols.bot"

          # Pull latest before committing — prevents race condition
          git pull origin live --rebase

          git add brainstew.html
          if git diff --staged --quiet; then
            echo "No changes — post already exists, skipping"
          else
            git commit -m "📧 New BS Mail post published [skip ci]"
            git push origin live
            echo "Done — site will update in ~60 seconds"
          fi

      # ── 6. Send newsletter (optional) ─────────────────────
      # Skipped automatically if BUTTONDOWN_API_KEY secret is not set.
      # Add newsletter: false to a post's frontmatter to skip that post.
      - name: Send newsletter
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$BUTTONDOWN_API_KEY" ]; then
            echo "No BUTTONDOWN_API_KEY — skipping newsletter"
            exit 0
          fi
          python3 .github/scripts/send_newsletter.py \
            "${{ steps.find_posts.outputs.changed_files }}"
