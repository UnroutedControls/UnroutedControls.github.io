name: Publish BS Mail Post

# ─────────────────────────────────────────────────────────────
# BRANCHES
#   main  = source of truth. authors write and push here.
#   live  = deploy target. GitHub Pages serves this branch.
#           the bot owns it — never edit brainstew.html here manually.
#
# TRIGGER
#   fires only when a .md file inside posts/ is pushed to main.
#   pushing to live never triggers this workflow.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      - 'posts/**.md'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:

      # 1. Check out main (full history needed for git diff)
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Identify which .md files changed in this push
      - name: Find changed posts
        id: find_posts
        run: |
          CHANGED=$(
            git diff --name-only --diff-filter=AM \
              ${{ github.event.before }} ${{ github.sha }} \
              -- 'posts/*.md' 2>/dev/null \
            || git show --name-only --format="" \
              ${{ github.sha }} -- 'posts/*.md'
          )
          if [ -z "$CHANGED" ]; then
            echo "No markdown posts found in this push — exiting"
            exit 0
          fi
          echo "Posts to publish:"
          echo "$CHANGED"
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED"          >> $GITHUB_OUTPUT
          echo "EOF"               >> $GITHUB_OUTPUT

      # 4. Fetch live and pull latest brainstew.html from it
      #    We always patch the live version, not the main version.
      #    This means live's brainstew.html is the canonical copy.
      - name: Get live brainstew.html
        run: |
          git fetch origin live
          git checkout origin/live -- brainstew.html
          echo "Fetched brainstew.html from live ($(wc -c < brainstew.html) bytes)"

      # 5. Run the patcher against the live brainstew.html
      - name: Patch brainstew.html
        run: |
          python3 .github/scripts/patch_brainstew.py \
            "${{ steps.find_posts.outputs.changed_files }}"

      # 6. Push ONLY the patched brainstew.html to live
      #    We rebase on the current tip of live first to prevent
      #    race conditions if two posts are pushed close together.
      - name: Commit and push to live
        run: |
          git config user.name  "BS Mail Bot"
          git config user.email "bsmail@unroutedcontrols.bot"

          # Ensure we start from a clean live branch state
          git fetch origin live
          git checkout live
          git reset --hard origin/live

          # Copy the patched brainstew.html from the workspace (assumes patch step overwrote ./brainstew.html)
          if [ ! -f "./brainstew.html" ]; then
            echo "ERROR: brainstew.html not found in workspace. Ensure the patch step wrote ./brainstew.html"
            exit 1
          fi

          # Stage and commit only if changed
          git add brainstew.html
          if git diff --staged --quiet; then
            echo "No changes — post likely already exists in brainstew.html"
          else
            git commit -m "📧 New BS Mail post published [skip ci]"
            git push origin live
            echo "Done — live branch updated"
          fi

